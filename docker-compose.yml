version: "3.8"

services:
  localstack:
    image: localstack/localstack:3.4.0
    container_name: datalake_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
    volumes:
      - ./volume/localstack:/var/lib/localstack
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: dwh_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin123}
      - POSTGRES_DB=${DB_NAME:-sales_dwh}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sales_dwh"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  etl_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etl_runner
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-sales_dwh}
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET_NAME=retail-data-lake
    volumes:
      - ./data_pipeline:/app/data_pipeline
      - ./data:/app/data
      - ./infrastructure:/app/infrastructure
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '📤 Uploading data to S3...' &&
        python /app/infrastructure/init_s3.py &&
        echo '🚀 Running ETL pipeline...' &&
        python /app/data_pipeline/etl_script.py &&
        echo '✅ ETL complete.'
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - DB_NAME=${DB_NAME:-sales_dwh}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ui_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
